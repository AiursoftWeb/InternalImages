<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PaddleOCR – Optical Character Recognition Service</title>
<style>
/* ── Reset & Base ─────────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f6f9;--surface:#fff;--border:#e2e6ec;
  --text:#1e293b;--text2:#64748b;--text3:#94a3b8;
  --accent:#3b82f6;--accent-hover:#2563eb;--accent-light:#eff6ff;
  --danger:#ef4444;--danger-hover:#dc2626;
  --success:#22c55e;--warn:#f59e0b;
  --radius:12px;--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow-lg:0 10px 25px rgba(0,0,0,.08);
}
html{font-size:15px;scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans SC",sans-serif;
  background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}

/* ── Header ───────────────────────────────────────────────────────────────── */
.header{
  background:linear-gradient(135deg,#3b82f6 0%,#2dd4bf 100%);
  color:#fff;padding:2.5rem 1.5rem 2rem;text-align:center;position:relative;overflow:hidden;
}
.header h1{font-size:2rem;font-weight:700;margin-bottom:.35rem;position:relative}
.header p{opacity:.88;font-size:1rem;position:relative}

/* ── System badges ────────────────────────────────────────────────────────── */
.sys-badges{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;margin-top:1.2rem;position:relative}
.badge{
  display:inline-flex;align-items:center;gap:.35rem;
  background:rgba(255,255,255,.18);backdrop-filter:blur(4px);
  border:1px solid rgba(255,255,255,.25);border-radius:999px;
  padding:.3rem .85rem;font-size:.8rem;font-weight:500;color:#fff;
}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-green{background:#4ade80}.dot-yellow{background:#fbbf24}.dot-red{background:#f87171}.dot-blue{background:#60a5fa}

/* ── Layout ───────────────────────────────────────────────────────────────── */
.container{max-width:900px;margin:0 auto;padding:1.5rem 1rem 3rem}
.card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:1.5rem;margin-bottom:1.25rem;box-shadow:var(--shadow);
}
.card h2{font-size:1.15rem;font-weight:600;margin-bottom:.9rem;display:flex;align-items:center;gap:.5rem}

/* ── OCR Area ────────────────────────────────────────────────────────────── */
.upload-zone{
  border:2px dashed var(--border);border-radius:var(--radius);
  padding:2rem;text-align:center;cursor:pointer;transition:all .2s;
  background:#f8fafc;position:relative;
}
.upload-zone:hover{border-color:var(--accent);background:var(--accent-light)}
.upload-zone.dragging{border-color:var(--accent);background:var(--accent-light)}
.upload-zone .icon{font-size:3rem;margin-bottom:1rem;display:block}
.upload-zone p{color:var(--text2);font-size:.9rem}
#fileInput{display:none}

.preview-container{
  margin-top:1.5rem;display:none;text-align:center;
}
.preview-container.active{display:block}
#imagePreview{max-width:100%;max-height:400px;border-radius:8px;box-shadow:var(--shadow)}

/* ── Result Area ─────────────────────────────────────────────────────────── */
.result-area{margin-top:1.5rem;display:none}
.result-area.active{display:block}
.result-list{display:flex;flex-direction:column;gap:.5rem}
.result-item{
  background:#f8fafc;border:1px solid var(--border);border-radius:8px;
  padding:.75rem 1rem;display:flex;justify-content:space-between;align-items:center;
}
.result-text{font-size:.95rem;font-weight:500}
.result-conf{font-size:.75rem;color:var(--text3);font-family:monospace}

/* ── Buttons ──────────────────────────────────────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:.35rem;
  border:none;border-radius:8px;padding:.55rem 1.1rem;
  font-size:.88rem;font-weight:500;cursor:pointer;transition:all .15s;
}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover);transform:translateY(-1px)}
.btn-primary:disabled{background:var(--text3);cursor:not-allowed}

/* ── Spinner ──────────────────────────────────────────────────────────────── */
.spinner{
  display:inline-block;width:18px;height:18px;
  border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;
  animation:spin .6s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── API Docs ─────────────────────────────────────────────────────────────── */
.api-section details{margin-bottom:.75rem}
.api-section summary{
  cursor:pointer;font-weight:500;font-size:.92rem;padding:.5rem .75rem;
  background:#f8fafc;border:1px solid var(--border);border-radius:8px;
  list-style:none;display:flex;align-items:center;gap:.5rem;
}
.api-section summary::before{content:'▸';font-size:.8rem;transition:transform .2s}
.api-section details[open] summary::before{transform:rotate(90deg)}
.api-section pre{
  background:#1e293b;color:#e2e8f0;padding:1rem;border-radius:8px;
  font-size:.82rem;line-height:1.5;overflow-x:auto;margin:.6rem 0;
}

/* ── Auth Overlay ─────────────────────────────────────────────────────────── */
.auth-overlay{
  position:fixed;inset:0;z-index:10000;background:rgba(15,23,42,.92);
  display:flex;align-items:center;justify-content:center;padding:1rem;
}
.auth-card{
  width:min(400px,100%);background:var(--surface);border-radius:14px;padding:1.5rem;
}

/* ── Footer ───────────────────────────────────────────────────────────────── */
.footer{text-align:center;padding:1.5rem;color:var(--text3);font-size:.82rem}
</style>
</head>
<body>

<div class="header">
  <h1>🔍 PaddleOCR</h1>
  <p>高精度多语言光学字符识别服务</p>
  <div class="sys-badges" id="sysBadges">
    <span class="badge"><span class="dot dot-blue"></span>加载中…</span>
  </div>
</div>

<div class="container">
  <div class="card">
    <h2><span class="icon">🖼️</span> 图片识别</h2>
    <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <span class="icon">📁</span>
      <p>点击上传、拖拽图片或直接粘贴剪贴板内容</p>
      <input type="file" id="fileInput" accept="image/*" onchange="handleFile(this.files[0])">
    </div>

    <div class="preview-container" id="previewContainer">
      <img id="imagePreview" src="" alt="Preview">
      <div style="margin-top:1rem">
        <button class="btn btn-primary" id="ocrBtn" onclick="doOCR()">✨ 开始识别</button>
      </div>
    </div>

    <div class="result-area" id="resultArea">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.8rem">
        <p style="font-size:.85rem;font-weight:600;color:var(--text2)">识别结果</p>
        <span id="durationTag" style="font-size:.75rem;color:var(--text3)"></span>
      </div>
      <div class="result-list" id="resultList"></div>
    </div>
  </div>

  <div class="card api-section">
    <h2><span class="icon">📡</span> API 文档</h2>
    <details>
      <summary><span style="background:#3b82f6;color:#fff;padding:.1rem .4rem;border-radius:4px;font-size:.7rem">POST</span> <code>/api/ocr</code> — 图片文字识别</summary>
      <div style="padding:.8rem;font-size:.88rem;color:var(--text2)">
        支持常见图片格式，返回识别出的文字行及其位置。
        <pre id="apiOcrExample"></pre>
      </div>
    </details>
    <details>
      <summary><span style="background:#22c55e;color:#fff;padding:.1rem .4rem;border-radius:4px;font-size:.7rem">GET</span> <code>/api/system</code> — 系统状态</summary>
      <div style="padding:.8rem;font-size:.88rem;color:var(--text2)">
        返回运行设备类型及模型加载状态。
      </div>
    </details>
  </div>
</div>

<div class="footer">PaddleOCR · Aiursoft Internal Image</div>

<div class="auth-overlay" id="authOverlay" style="display:none">
  <div class="auth-card">
    <h3 style="margin-bottom:.5rem">🔐 输入访问密钥</h3>
    <input type="password" id="apiKeyInput" style="width:100%;padding:.5rem;margin-bottom:1rem;border:1px solid var(--border);border-radius:6px" placeholder="OCR Access Token">
    <button class="btn btn-primary" style="width:100%" onclick="submitApiKey()">验证并进入</button>
    <p id="authError" style="color:var(--danger);font-size:.8rem;margin-top:.5rem"></p>
  </div>
</div>

<script>
const AUTH_REQUIRED = (typeof __OCR_AUTH_REQUIRED__ !== 'undefined') ? __OCR_AUTH_REQUIRED__ : false;
let API_KEY = localStorage.getItem('ocr_api_key') || '';
let selectedFile = null;

function authHeaders() {
  return API_KEY ? { Authorization: `Bearer ${API_KEY}` } : {};
}

async function apiFetch(url, options = {}) {
  const headers = { ...(options.headers || {}), ...authHeaders() };
  return fetch(url, { ...options, headers });
}

async function submitApiKey() {
  const val = document.getElementById('apiKeyInput').value;
  API_KEY = val;
  try {
    const r = await apiFetch('/api/system');
    if (!r.ok) throw new Error();
    localStorage.setItem('ocr_api_key', val);
    document.getElementById('authOverlay').style.display = 'none';
    loadSystemInfo();
  } catch {
    document.getElementById('authError').textContent = '密钥验证失败';
  }
}

async function loadSystemInfo() {
  try {
    const r = await apiFetch('/api/system');
    const d = await r.json();
    const el = document.getElementById('sysBadges');
    el.innerHTML = `
      <span class="badge"><span class="dot ${d.device.includes('GPU')?'dot-green':'dot-yellow'}"></span>${d.device}</span>
      <span class="badge"><span class="dot ${d.model_loaded?'dot-green':'dot-red'}"></span>模型 ${d.model_loaded?'已就绪':'未加载'}</span>
      <span class="badge"><span class="dot dot-blue"></span>${d.arch}</span>
    `;
  } catch(e) {
    document.getElementById('sysBadges').innerHTML = '<span class="badge"><span class="dot dot-red"></span>连接服务失败</span>';
  }
}

function handleFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  selectedFile = file;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('imagePreview').src = e.target.result;
    document.getElementById('previewContainer').classList.add('active');
    document.getElementById('resultArea').classList.remove('active');
  };
  reader.readAsDataURL(file);
}

// 粘贴支持
window.addEventListener('paste', e => {
  const items = e.clipboardData.items;
  for (let item of items) {
    if (item.type.startsWith('image/')) handleFile(item.getAsFile());
  }
});

async function doOCR() {
  if (!selectedFile) return;
  const btn = document.getElementById('ocrBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 识别中…';

  const fd = new FormData();
  fd.append('file', selectedFile);

  try {
    const r = await apiFetch('/api/ocr', { method: 'POST', body: fd });
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || '识别失败');

    document.getElementById('durationTag').textContent = `耗时 ${d.duration_s.toFixed(2)}s`;
    const list = document.getElementById('resultList');
    list.innerHTML = d.results.map(res => `
      <div class="result-item">
        <span class="result-text">${res.text}</span>
        <span class="result-conf">${(res.confidence * 100).toFixed(1)}%</span>
      </div>
    `).join('');
    if (d.results.length === 0) list.innerHTML = '<p style="color:var(--text3);text-align:center;padding:1rem">未能识别出文字</p>';
    document.getElementById('resultArea').classList.add('active');
  } catch (e) {
    alert(e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '✨ 开始识别';
  }
}

// Init
if (AUTH_REQUIRED && !API_KEY) {
  document.getElementById('authOverlay').style.display = 'flex';
} else {
  loadSystemInfo();
}

document.getElementById('apiOcrExample').textContent = `curl -X POST "${window.location.origin}/api/ocr" 
  -H "Authorization: Bearer <TOKEN>" 
  -F "file=@image.jpg"`;

// Drag & Drop
const dz = document.getElementById('dropZone');
['dragenter', 'dragover', 'dragleave', 'drop'].forEach(evt => {
  dz.addEventListener(evt, e => { e.preventDefault(); e.stopPropagation(); });
});
dz.addEventListener('dragover', () => dz.classList.add('dragging'));
dz.addEventListener('dragleave', () => dz.classList.remove('dragging'));
dz.addEventListener('drop', e => {
  dz.classList.remove('dragging');
  handleFile(e.dataTransfer.files[0]);
});
</script>
</body>
</html>
